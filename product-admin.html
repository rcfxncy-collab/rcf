<!DOCTYPE html>
<html>
<head>

<title>RC Fancy Admin</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:linear-gradient(135deg,#ff5f6d,#ffc371);
min-height:100vh;
}

header{
color:white;
text-align:center;
font-size:28px;
padding:20px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#4CAF50;
color:white;
}

.delete{
background:red;
color:white;
}

.edit{
background:#2196F3;
color:white;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.product img{
width:60px;
height:60px;
border-radius:6px;
object-fit:cover;
}

</style>

</head>

<body>

<header>RC FANCY ADMIN PANEL</header>

<div class="container">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input type="file" name="image">

<button onclick="addProduct()">Add Product</button>
<button onclick="loadProducts()">Refresh</button>
<button onclick="window.location.href='/index.html'">Go Back</button>

<hr>

<h3>All Products</h3>

<div id="products"></div>

</div>

<script>

let editID = null;

async function loadProducts(){

let res = await fetch("/api/products");
let data = await res.json();

let html="";

data.forEach(p=>{

html+=`

<div class="product">

<div>
<img src="${p.image}">
<b>${p.name}</b> ₹${p.price}
</div>

<div>

<button class="edit" onclick="editProduct('${p._id}','${p.name}','${p.price}','${p.image}')">Edit</button>

<button class="delete" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

loadProducts();

async function uploadImage(){

let file=document.getElementById("image").files[0];

let formData=new FormData();

formData.append("image",file);

let res=await fetch("/upload-image",{
method:"POST",
body:formData
});

let data=await res.json();

return data.image;

}

async function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;

let image=await uploadImage();

await fetch("/api/add-product",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,price,image})

});
alert("Product Added");
loadProducts();

}

async function deleteProduct(id){

await fetch("/api/delete-product/"+id,{
method:"DELETE"
});

loadProducts();

}

function editProduct(id,name,price,image){

editID=id;

document.getElementById("name").value=name;
document.getElementById("price").value=price;

}

</script>

</body>

</html>
