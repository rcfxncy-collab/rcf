<!DOCTYPE html>
<html>

<head>

<title>Admin Bill Upload</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

button{
padding:10px 15px;
cursor:pointer;
background:#007bff;
color:white;
border:none;
}

img{
margin-top:20px;
max-width:300px;
}

</style>

</head>

<body>

<h2>Admin Bill Upload Panel</h2>

<input id="mobile" placeholder="Customer Mobile Number">

<input id="billNumber" placeholder="Bill Number">

<input type="file" id="image">

<button onclick="uploadBill()">Upload Bill</button>

<p id="msg"></p>

<script>

async function uploadBill(){

const mobile = document.getElementById("mobile").value;
const billNumber = document.getElementById("billNumber").value;
const image = document.getElementById("image").files[0];

const formData = new FormData();

formData.append("mobile",mobile);
formData.append("billNumber",billNumber);
formData.append("image",image);

const res = await fetch("/admin/upload-bill",{
method:"POST",
body:formData
});

const data = await res.json();

if(data.success){
document.getElementById("msg").innerText="Bill Uploaded Successfully";
}else{
document.getElementById("msg").innerText="Upload Failed";
}

}

</script>

</body>

</html>
