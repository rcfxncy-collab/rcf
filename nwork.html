<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    body{
        
        background-color: rgb(255, 255, 255);
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;

    }
    

        
        
    
    input{
        padding: 10px;
        margin: 10px;
        width: 400px;
        border: 2px solid #0b0a0a;
        border-radius: 5px;
    }
    button{
        padding: 10px 20px;
        background-color: blue;
        color: white;
        border: none;
        cursor: pointer;
        width: 45%;
        border-radius: 5px;

        
    }
    .check{
        margin-top: 50px;
        background-color:  rgb(40, 85, 85);
        padding: 20px;
        border-radius: 10px;
        height: 1100px;
        margin-bottom: 50px;
    }
    .check h1{
            color: rgb(0, 0, 0);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 2);

    }
    .id{
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .check img{
        margin-bottom: 0px;
    }
    .img{
        margin-top: 20px;
        width: 100%;
        height: 400px;
        
    }


</style>

</head>
<body>
   
    <section class="check" id="check">
        
        <img src="logorcf.png" alt="Phone Bill Image" width="200" height="240">
     <h1>ROYAL COLLECTION & FANCY</h1>   
    <h3>CHECK YOUR BILLS</h3>
    <p>Enter your phone number to check your bills</p>
    <input id="mobile" placeholder="Enter your phone number">
    <input id="billNumber"  placeholder="Enter Your Bill No">
    <div class="id">
    <button  onclick="checkBill()">Check Bills</button>
   
    <button onclick="logout()">Back To Home</button>

    </div>
   
    <div class="img">
      
    <img id="billImage" src="/bills/${data.image}" alt="Bill Image">
    </div>
    </section>
    
    <script>
        function logout(){
window.location="https://rcfancy.online/";
}




async function checkBill(){

const mobile = document.getElementById("mobile").value;
const billNumber = document.getElementById("billNumber").value;

const res = await fetch("/customer/check-bill",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
mobile:mobile,
billNumber:billNumber
})

});

const data = await res.json();

if(data.success){

document.getElementById("billImage").src="/bills/" + data.image;

}else{

alert("Bill Not Found");

}

}















    </script>
</body>

</html>
